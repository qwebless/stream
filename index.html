<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Стрим-сервис</title>
    <style>
        body { font-family: sans-serif; background: #f0f2f5; margin: 0; }
        .hidden { display: none !important; }
        
        /* Чистый хедер без подложки */
        #profile-header { 
            position: fixed; top: 15px; right: 20px; 
            display: flex; align-items: center; gap: 15px; z-index: 1000;
        }

        /* Кнопка с иконкой вместо текста */
        .logout-btn { 
            background: none; border: none; cursor: pointer; padding: 0; display: flex; align-items: center;
        }
        
        /* Модальное окно (оставил как было) */
        #setup-modal { display: none; position: fixed; top: 20%; left: 35%; background: white; padding: 30px; border-radius: 10px; box-shadow: 0 0 20px rgba(0,0,0,0.2); z-index: 1000; }
        #content { padding: 80px 20px; text-align: center; }
    </style>
</head>
<body>

    <div id="profile-header">
        <span id="user-info"></span>
        <button id="login-btn">Войти</button>
        
        <button id="logout-btn" class="hidden logout-btn">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="red" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"></path>
                <polyline points="10 17 15 12 10 7"></polyline>
                <line x1="15" y1="12" x2="3" y2="12"></line>
            </svg>
        </button>
    </div>

    <div id="setup-modal">
        <h3>Установи ник</h3>
        <input type="text" id="setup-name" placeholder="Твой ник">
        <br><br>
        <button id="save-name-btn">Сохранить</button>
    </div>

    <div id="content" class="hidden">
        <h2>Ты в системе!</h2>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut, updateProfile } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDMFw62BVm7Y12P8PVftSBayAZJUnpTgb0",
            authDomain: "fatmonkey-cd4b8.firebaseapp.com",
            projectId: "fatmonkey-cd4b8",
            storageBucket: "fatmonkey-cd4b8.firebasestorage.app",
            messagingSenderId: "540431910490",
            appId: "1:540431910490:web:2235bd68684fabb26e3a63",
            measurementId: "G-BNS4Y65D36"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const provider = new GoogleAuthProvider();

        const loginBtn = document.getElementById('login-btn');
        const logoutBtn = document.getElementById('logout-btn');
        const userInfo = document.getElementById('user-info');
        const content = document.getElementById('content');
        const setupModal = document.getElementById('setup-modal');

        onAuthStateChanged(auth, (user) => {
            if (user) {
                loginBtn.classList.add('hidden');
                logoutBtn.classList.remove('hidden');
                content.classList.remove('hidden');

                if (user.displayName) {
                    // Просто ник, без слова "Привет"
                    userInfo.innerText = user.displayName;
                    setupModal.style.display = 'none';
                } else {
                    setupModal.style.display = 'block';
                    userInfo.innerText = "Нужен ник!";
                }
            } else {
                userInfo.innerText = ""; // Пусто, когда не в сети
                loginBtn.classList.remove('hidden');
                logoutBtn.classList.add('hidden');
                content.classList.add('hidden');
                setupModal.style.display = 'none';
            }
        });

        loginBtn.addEventListener('click', () => {
            signInWithPopup(auth, provider).catch(err => console.error(err));
        });

        logoutBtn.addEventListener('click', () => signOut(auth));

        document.getElementById('save-name-btn').addEventListener('click', async () => {
            const user = auth.currentUser;
            const newName = document.getElementById('setup-name').value;

            if (newName.trim().length > 0) {
                await updateProfile(user, { displayName: newName });
                location.reload(); 
            } else {
                alert("Введите ник!");
            }
        });
    </script>
</body>
</html>
