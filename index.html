<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stream Platform</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Шапка с авторизацией и профилем -->
    <header class="header">
        <div class="logo">BRO.STREAM</div>
        <div class="user-panel">
            <!-- Тут будет виджет логина через Telegram -->
            <button class="tg-login-btn">Войти через Telegram</button>
            
            <!-- Этот блок покажем, когда юзер зайдет, чтобы он мог менять ник/аву -->
            <!-- 
            <div class="profile-setup">
                <img src="default-avatar.png" alt="Аватар" class="avatar-preview">
                <span class="nickname">User123</span>
                <button class="edit-profile-btn">⚙️</button>
            </div> 
            -->
        </div>
    </header>

    <!-- Основной контент -->
    <main class="container">
        
        <!-- Блок с плеером -->
        <div class="player-section">
            <div class="video-placeholder">
                <span>Плеер будет здесь</span>
            </div>
            <div class="stream-info">
                <h1>Название стрима: Смотрим футбол</h1>
                <p>Онлайн: 10</p>
            </div>
        </div>

        <!-- Блок чата -->
        <div class="chat-section">
            <div class="chat-messages">
                <div class="message"><strong>Admin:</strong> Всем привет, стрим скоро начнется!</div>
                <div class="message"><strong>Viewer1:</strong> Ждем!</div>
            </div>
            <div class="chat-input-area">
                <input type="text" placeholder="Написать в чат..." class="chat-input">
                <button class="send-btn">Отправить</button>
            </div>
        </div>

    </main>

</body>
</html>
