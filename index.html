<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Стрим-сервис</title>
    <style>
        body { font-family: sans-serif; background: #f0f2f5; margin: 0; }
        .hidden { display: none !important; }
        
        #profile-header { position: fixed; top: 10px; right: 10px; background: white; padding: 10px 20px; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.15); display: flex; align-items: center; gap: 15px; z-index: 1000; }
        
        #setup-modal { display: none; position: fixed; top: 20%; left: 35%; background: white; padding: 30px; border-radius: 10px; box-shadow: 0 0 20px rgba(0,0,0,0.2); z-index: 1000; }
        #content { padding: 80px 20px; text-align: center; }
    </style>
</head>
<body>

    <div id="profile-header">
        <span id="user-info">Не в сети</span>
        <button id="login-btn">Войти</button>
        <button id="logout-btn" class="hidden">Выйти</button>
    </div>

    <div id="setup-modal">
        <h3>Заверши регистрацию</h3>
        <input type="text" id="setup-name" placeholder="Твой ник">
        <br><br>
        <input type="file" id="setup-avatar" accept="image/*">
        <br><br>
        <button id="save-profile-btn">Сохранить</button>
    </div>

    <div id="content" class="hidden">
        <h2>Добро пожаловать в приватную зону!</h2>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut, updateProfile } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-storage.js";

        // Твои ключи вставлены
        const firebaseConfig = {
            apiKey: "AIzaSyDMFw62BVm7Y12P8PVftSBayAZJUnpTgb0",
            authDomain: "fatmonkey-cd4b8.firebaseapp.com",
            projectId: "fatmonkey-cd4b8",
            storageBucket: "fatmonkey-cd4b8.firebasestorage.app",
            messagingSenderId: "540431910490",
            appId: "1:540431910490:web:2235bd68684fabb26e3a63",
            measurementId: "G-BNS4Y65D36"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const storage = getStorage();
        const provider = new GoogleAuthProvider();

        const loginBtn = document.getElementById('login-btn');
        const logoutBtn = document.getElementById('logout-btn');
        const userInfo = document.getElementById('user-info');
        const content = document.getElementById('content');
        const setupModal = document.getElementById('setup-modal');

        onAuthStateChanged(auth, (user) => {
            if (user) {
                userInfo.innerText = `Привет, ${user.displayName || "гость"}`;
                loginBtn.classList.add('hidden');
                logoutBtn.classList.remove('hidden');
                content.classList.remove('hidden');
            } else {
                userInfo.innerText = "Не в сети";
                loginBtn.classList.remove('hidden');
                logoutBtn.classList.add('hidden');
                content.classList.add('hidden');
            }
        });

        loginBtn.addEventListener('click', () => {
            signInWithPopup(auth, provider)
                .then(() => setupModal.style.display = 'block')
                .catch(err => console.error(err));
        });

        logoutBtn.addEventListener('click', () => signOut(auth));

        document.getElementById('save-profile-btn').addEventListener('click', async () => {
            const user = auth.currentUser;
            const newName = document.getElementById('setup-name').value;
            const fileInput = document.getElementById('setup-avatar');
            let photoURL = user.photoURL;

            try {
                if (fileInput.files.length > 0) {
                    const file = fileInput.files[0];
                    const storageRef = ref(storage, 'avatars/' + user.uid);
                    await uploadBytes(storageRef, file);
                    photoURL = await getDownloadURL(storageRef);
                }

                await updateProfile(user, {
                    displayName: newName || user.displayName,
                    photoURL: photoURL
                });

                alert("Готово!");
                setupModal.style.display = 'none';
                location.reload(); 
            } catch (err) {
                alert("Ошибка: " + err.message);
            }
        });
    </script>
</body>
</html>
