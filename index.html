<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Стрим-сервис</title>
    <style>
        body { font-family: sans-serif; background: #f0f2f5; margin: 0; height: 100vh; }
        .hidden { display: none !important; }
        
        /* Экран входа (по центру) */
        #auth-screen { display: flex; justify-content: center; align-items: center; height: 100vh; }
        
        /* Основной интерфейс */
        #app-screen { display: flex; height: 100vh; }
        #sidebar { width: 200px; background: #ffffff; border-right: 1px solid #ddd; padding: 20px; }
        #main-content { flex-grow: 1; padding: 50px; position: relative; }
        
        /* Хедер профиля */
        #profile-header { position: absolute; top: 15px; right: 20px; display: flex; align-items: center; gap: 15px; }
        
        /* Профиль */
        .profile-card { text-align: center; max-width: 400px; margin: 0 auto; }
        #user-nick { font-size: 32px; font-weight: bold; margin-bottom: 10px; }
        
        /* Модалка */
        #setup-modal { display: none; position: fixed; top: 30%; left: 40%; background: white; padding: 30px; border-radius: 10px; box-shadow: 0 0 20px rgba(0,0,0,0.2); z-index: 1000; }
        .logout-btn { background: none; border: none; cursor: pointer; }
    </style>
</head>
<body>

    <div id="auth-screen">
        <button id="login-btn" style="padding: 15px 30px; font-size: 18px;">Войти через Google</button>
    </div>

    <div id="app-screen" class="hidden">
        <div id="sidebar">
            <h3>Каналы</h3>
        </div>
        
        <div id="main-content">
            <div id="profile-header">
                <span id="header-nick"></span>
                <button id="logout-btn" class="logout-btn">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="red" stroke-width="2"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"></path><polyline points="10 17 15 12 10 7"></polyline><line x1="15" y1="12" x2="3" y2="12"></line></svg>
                </button>
            </div>

            <div class="profile-card">
                <h1 id="user-nick"></h1>
                <p>Тут будет твое Био (можно добавить позже)</p>
            </div>
        </div>
    </div>

    <div id="setup-modal">
        <h3>Установи ник</h3>
        <input type="text" id="setup-name" placeholder="Твой ник">
        <button id="save-name-btn">Сохранить</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut, updateProfile } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDMFw62BVm7Y12P8PVftSBayAZJUnpTgb0",
            authDomain: "fatmonkey-cd4b8.firebaseapp.com",
            projectId: "fatmonkey-cd4b8",
            storageBucket: "fatmonkey-cd4b8.firebasestorage.app",
            messagingSenderId: "540431910490",
            appId: "1:540431910490:web:2235bd68684fabb26e3a63",
            measurementId: "G-BNS4Y65D36"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const provider = new GoogleAuthProvider();

        const authScreen = document.getElementById('auth-screen');
        const appScreen = document.getElementById('app-screen');
        const setupModal = document.getElementById('setup-modal');

        onAuthStateChanged(auth, (user) => {
            if (user) {
                // Если зашли: прячем экран входа, показываем приложение
                authScreen.classList.add('hidden');
                appScreen.classList.remove('hidden');

                if (user.displayName) {
                    document.getElementById('user-nick').innerText = user.displayName;
                    document.getElementById('header-nick').innerText = user.displayName;
                    setupModal.style.display = 'none';
                } else {
                    setupModal.style.display = 'block';
                }
            } else {
                // Если вышли: показываем экран входа
                authScreen.classList.remove('hidden');
                appScreen.classList.add('hidden');
                setupModal.style.display = 'none';
            }
        });

        document.getElementById('login-btn').addEventListener('click', () => signInWithPopup(auth, provider));
        document.getElementById('logout-btn').addEventListener('click', () => signOut(auth));
        
        document.getElementById('save-name-btn').addEventListener('click', async () => {
            const name = document.getElementById('setup-name').value;
            if (name.trim()) {
                await updateProfile(auth.currentUser, { displayName: name });
                location.reload();
            }
        });
    </script>
</body>
</html>
